{% extends "base.html" %}
{% block title %}{{ year }} — {{ site.site_title }}{% endblock %}
{% block content %}
<h1>{{ year }}</h1>
<ul class="post-list compact">
  {% for p in posts %}
  <li class="post-item"><a class="post-link" href="{{ p.url }}">{{ p.title }}</a>{% if p.favorite %} <span class="fav" title="favorite">&hearts;</span>{% endif %}
    <time>{{ p.date.strftime('%m-%d') }}</time></li>
  {% endfor %}
</ul>
{% endblock %}
